frameworkVersion: '3'
service: chatbot-frontend
useDotenv: true

provider:
  name: aws
  region: ${env:AWS_REGION, 'ap-northeast-2'}
  stage: dev
  profile: ${env:AWS_PROFILE, 'dongik2'}

plugins:
  - serverless-s3-sync
  - serverless-cloudfront-invalidate

custom:
  websiteBucketName: ${self:service}-${sls:stage}-${aws:accountId}-${aws:region}
  cloudFrontOacName: ${self:service}-${sls:stage}-${aws:accountId}-${aws:region}-oac
  s3Sync:
    - bucketName: ${self:custom.websiteBucketName}
      localDir: dist
      deleteRemoved: true
  cloudfrontInvalidate:
    - distributionIdKey: CloudFrontDistributionId
      items:
        - "/*"

resources:
  Resources:
    WebsiteBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.websiteBucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    WebsiteBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref WebsiteBucket
        PolicyDocument:
          Statement:
            - Sid: AllowCloudFrontOAC
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Join ["", [!GetAtt WebsiteBucket.Arn, "/*"]]
              Condition:
                StringEquals:
                  AWS:SourceArn: !Join
                    - ""
                    - - "arn:aws:cloudfront::"
                      - !Ref AWS::AccountId
                      - ":distribution/"
                      - !Ref CloudFrontDistribution

    CloudFrontOAC:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:custom.cloudFrontOacName}
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Origins:
            - Id: S3Origin
              DomainName: !GetAtt WebsiteBucket.RegionalDomainName
              OriginAccessControlId: !Ref CloudFrontOAC
              S3OriginConfig:
                OriginAccessIdentity: ""
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            Compress: true
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html

  Outputs:
    CloudFrontDistributionId:
      Value: !Ref CloudFrontDistribution
    CloudFrontDomainName:
      Value: !GetAtt CloudFrontDistribution.DomainName
    WebsiteUrl:
      Value: !Join ["", ["https://", !GetAtt CloudFrontDistribution.DomainName]]
    WebsiteBucketName:
      Value: !Ref WebsiteBucket
