frameworkVersion: '3'
service: chatbot-backend
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  deploymentMethod: direct
  versionFunctions: false
  stage: ${env:STAGE, 'dev'}
  stackName: ${self:service}-${sls:stage}
  region: ${env:AWS_REGION, 'ap-northeast-2'}
  profile: ${env:AWS_PROFILE, 'dongik2'}
  timeout: 29
  tags:
    Service: ${self:service}
    Environment: ${sls:stage}
  stackTags:
    Service: ${self:service}
    Environment: ${sls:stage}
  environment:
    service: ${self:service}
    stage: ${sls:stage}
    region: ${env:AWS_REGION, 'ap-northeast-2'}
    CONVERSATIONS_TABLE: ${self:service}-conversations-${sls:stage}
  deploymentBucket:
    name: ${aws:accountId}-serverless-deploys
    maxPreviousDeploymentArtifacts: 5
    blockPublicAccess: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:BatchWriteItem
          Resource:
            - Fn::GetAtt:
                - ConversationsTable
                - Arn
            - Fn::Join:
                - ""
                - - Fn::GetAtt:
                      - ConversationsTable
                      - Arn
                  - /index/*

  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - x-session-id
      allowedMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS

plugins:
  - serverless-esbuild
  - serverless-deployment-bucket
  - serverless-cloudformation-sub-variables

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: node
    target: node20
    format: esm
    outputFileExtension: .mjs
    banner:
      js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"

# chatStream is manually defined (Lambda Function URL, not supported by slsberry)
# Other functions are auto-generated by slsberry from apiSpec exports
functions:
  chatStream:
    name: ${self:service}_${sls:stage}_chatStream
    handler: src/lambda/chat/stream.handler
    timeout: 120
    url:
      invokeMode: RESPONSE_STREAM
      cors:
        allowedOrigins:
          - "*"
        allowedHeaders:
          - Content-Type
          - Authorization
          - x-session-id
        allowedMethods:
          - POST

resources:
  Resources:
    ConversationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONVERSATIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: sessionId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: SessionIndex
            KeySchema:
              - AttributeName: sessionId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

  Outputs:
    ChatStreamUrl:
      Description: Lambda Function URL for chat streaming
      Value:
        Fn::GetAtt:
          - ChatStreamLambdaFunctionUrl
          - FunctionUrl
